openapi: 3.0.0
info:
  version: 1.0.0
  title: B2B API Documentation
  description: Lorry Reciepts for Multi-Piece Shipments
  termsOfService: 'https://www.delhivery.com/terms-and-conditions.html'
  contact:
    name: B2B-Tech
    email: b2b-tech@delhivery.com
servers:
  - url: 'https://btob-api-dev.delhivery.com/'
    description: Test API Server
  - url: 'https://btob.api.delhivery.com/'
    description: Production API Server
tags:
  - name: Login
    description: APIs to fetch bearer token (validity 24 hrs)
  - name: Manifest
    description: Manifestation API
  - name: Invoice
    description: APIs for Invoices
  - name: Labels
    description: APIs to generate Label links
  - name: Label Pdf
    description: API to generate PDF of labels for single LRN
  - name: Track
    description: APIs to track LR
  - name: POD
    description: APIs to generate POD links
  - name: Logout
    description: APIs to clear login session
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginPayload:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username for client login
        password:
          type: string
          description: Password for client login
    ManifestPayload:
      required:
        - pickup_location
        - dropoff_location
        - d_mode
        - amount
        - invoices
        - weight
        - suborders
      properties:
        ident:
          type: string
          description: LR Number (Shipment Identifier)
        pickup_location:
          type: string
          description: Delhivery Registered Pickup Location Name
        dropoff_location:
          description: DropOff Location
          oneOf:
            - $ref: '#/components/schemas/DropReference'
            - $ref: '#/components/schemas/DropAddress'
        d_mode:
          type: string
          enum:
            - Prepaid
            - CoD
          description: Shipment type
        amount:
          type: number
          description: Amount Should be 0 for Prepaid and > 1 for CoD Shipments
        invoices:
          type: array
          items:
            type: object
            required:
              - ident
              - n_value
            properties:
              ident:
                type: string
                description: Invoice Number
              n_value:
                type: number
                description: Invoice Amount
              ewaybill:
                type: string
                description: Ewaybill number associated with this invoice
          minItems: 1
        weight:
          type: number
          description: Shipment weight in grams
        suborders:
          $ref: '#/components/schemas/MasterOrderPayload'
        dimensions:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - length
              - width
              - height
              - count
            properties:
              length:
                type: number
                minimum: 1
                description: length of the box in cm
              width:
                type: number
                minimum: 1
                description: width of the box in cm
              height:
                type: number
                minimum: 1
                description: height of the box in cm
              count:
                type: integer
                minimum: 1
                description: >-
                  No. of boxes having same combination of length, width and
                  height
        consignee_gst_tin:
          type: string
          description: Consignee gst number
        seller_gst_tin:
          type: string
          description: Seller gst number
        cb:
          $ref: '#/components/schemas/CallbackDataPayload'
    MasterOrderPayload:
      type: array
      minItems: 1
      items:
        type: object
        required:
          - ident
          - count
          - description
        properties:
          ident:
            type: string
            description: Order Number
          count:
            type: integer
            description: Boxes related to this order
          description:
            type: string
            description: Order description
          waybills:
            type: array
            minItems: 1
            items:
              type: string
              description: 'Waybill Number. Only 1 item is allowed if master is true'
          master:
            type: boolean
            default: true
            description: sets this waybill as master (required once per manifestation)
    LabelPdfGenerationPayload:
      required:
        - lrn
        - size
        - callback
      properties:
        lrn:
          type: string
          description: lrn for which the label's pdf have to be generated
        size:
          type: string
          description: size of the labels
          enum:
            - sm
            - md
            - a4
        callback:
          $ref: '#/components/schemas/CallbackDataPayload'
    EditInvoicePayload:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - dcn
              - rs
            properties:
              dcn:
                type: string
                description: Invoice Number
              rs:
                type: number
                minimum: 1
                description: Amount
              ewbn:
                type: string
                description: Ewaybill
            
      
    CallbackDataPayload:
      type: object
      description: Additional payload data for callback after job completion
      required:
        - uri
        - method
      properties:
        uri:
          type: string
          description: Url for callback request
        method:
          type: string
          enum:
            - PUT
            - POST
            - PATCH
          description: HTTP protocol supported for callback request
        authorization:
          type: string
          description: Authorization header if any to authorize the callback request
        headers:
          type: object
          properties:
            key:
              type: string
              description: Headers if any required to be added in callback requestt
    DropReference:
      type: string
      description: Reference name for the store details registered with Delhivery
    DropAddress:
      type: object
      required:
        - consignee
        - address
        - city
        - region
        - zip
        - phone
      properties:
        refnum:
          type: string
          description: Reference name for the store details registered with Delhivery
        consignee:
          type: string
          description: Consignee Name
        address:
          type: string
          description: Consignee Address
        city:
          type: string
          description: Consignee City
        region:
          type: string
          description: Consignee State/Region
        zip:
          type: string
          description: Consignee Pincode (should be same as specified in basic manifest)
        phone:
          type: string
          description: Consignee contact number
        email:
          type: string
          description: Consignee email
    UsernameMissing:
      type: object
      properties:
        error:
          type: object
          properties:
            password:
              type: array
              items:
                type: string
    PasswordMissing:
      type: object
      properties:
        error:
          type: object
          properties:
            password:
              type: array
              items:
                type: string
    JobResponse:
      oneOf:
        - $ref: '#/components/schemas/JobPendingResponse'
        - $ref: '#/components/schemas/JobSuccessResponse'
        - $ref: '#/components/schemas/JobFailureResponse'
    JobPendingResponse:
      type: object
      properties:
        status:
          type: object
          properties:
            type:
              type: string
              enum:
                - Processing
              description: Status of queued request
    JobSuccessResponse:
      type: object
      properties:
        status:
          type: object
          properties:
            type:
              type: string
              enum:
                - Complete
              description: Status of queued request
            success:
              type: boolean
              enum:
                - true
            value:
              type: object
              properties:
                lrnum:
                  type: string
                  description: Shipment Identifier (LRN)
    JobFailureResponse:
      type: object
      properties:
        status:
          type: object
          properties:
            type:
              type: string
              enum:
                - Complete
              description: Status of queued request
            success:
              type: boolean
              enum:
                - false
            value:
              type: string
              enum:
                - ConfigurationError
                - SchemaValidationError
            reason:
              type: string
              description: Remark for job failure
    LabelStatus:
      type: array
      items:
        type: string
        description: Get Label Status
    TrackStatus:
      type: object
      required:
        - lrnum
        - status
        - location
        - timestamp
        - count
      properties:
        lrnum:
          type: string
          description: Shipment identifier
        status:
          type: string
          description: Last known status
        location:
          type: string
          description: Last known location
        timestamp:
          type: string
          format: date-time
          description: Time of recording status
        count:
          type: integer
          minimum: 1
          description: Box count of LR
paths:
  /ums/login/:
    post:
      summary: Provide bearer token for delhivery APIs
      tags:
        - Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UsernameMissing'
                  - $ref: '#/components/schemas/PasswordMissing'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Reason of error
  /v2/manifest:
    post:
      summary: Create shipment data
      tags:
        - Manifest
      security:
        - bearerAuth: []
      requestBody:
        description: shipment details creation payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestPayload'              
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: Job ID for queued shipment data creation request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
    get:
      summary: shipment data creation status
      tags:
        - Manifest
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: job_id
          required: true
          schema:
            type: string
            description: Job ID for queued shipment data creation request
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                  request_id:
                    type: string
  '/v2/get-label-urls/{size}/{lrnum}':
    get:
      summary: Label Printing API
      tags:
        - Labels
      security:
        - bearerAuth: []
      parameters:
        - name: size
          in: path
          required: true
          schema:
            type: string
            enum:
              - sm
              - md
              - a4
            description: Label dimension
        - name: lrnum
          in: path
          required: true
          schema:
            type: string
            description: Lr Number (Shipment Identifier)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '404':
          description: NOT FOUND
          content:
            application/json:
              schema:
                type: object
  /docket/generate_label_pdf:
    post:
      summary: generate PDF of labels for single LRN
      tags:
        - Label Pdf
      security:
        - bearerAuth: []
      requestBody:
        description: LRN and size of the labels along with the callback
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelPdfGenerationPayload'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: Job ID for queued label pdf generation
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
  '/v2/track/{lrnum}':
    get:
      summary: Provide complete tracking information for a LR Number
      tags:
        - Track
      security:
        - bearerAuth: []
      parameters:
        - name: lrnum
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '404':
          description: NOT FOUND
          content:
            application/json:
              schema:
                type: object
  '/v2/pod/{lrnum}':
    get:
      summary: Retrieve PoD against a LR Number
      security:
        - bearerAuth: []
      tags:
        - POD
      parameters:
        - name: lrnum
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '404':
          description: NOT FOUND
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /trms/invoice/{lrnum}:
    put:
      summary: Edit Invoice
      tags:
        - Invoice
      security:
        - bearerAuth: []
      parameters:
        - name: lrnum
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Payload for edit invoice details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditInvoicePayload'              
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: Job ID for queued shipment data creation request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
  /ums/logout/:
    get:
      summary: Provide bearer token for delhivery APIs
      tags:
        - Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: string
                    example: session removed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Reason of error


