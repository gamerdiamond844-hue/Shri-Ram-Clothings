services:
  - type: web
    name: shri-ram-clothings
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SITE_URL
        value: https://www.shriramclothings.in
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYTM_MID
        sync: false
      - key: PAYTM_MKEY
        sync: false
      - key: PAYTM_WEBSITE
        sync: false
      - key: PAYTM_INDUSTRY_TYPE
        sync: false
      - key: PAYTM_CHANNEL_ID
        sync: false
      - key: PAYTM_CALLBACK_URL
        sync: false
      - key: PAYTM_FRONTEND_URL
        sync: false
      - key: PAYTM_ENV
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
